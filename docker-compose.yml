services:
  db:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servicio que corre migraciones una sola vez al iniciar el stack.
  # web y worker dependen de que este servicio termine exitosamente.
  init:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py migrate --noinput
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8001:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  # Servidor Ollama local (LLM) para el chatbot. En dev corre solo CPU.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Descarga el modelo una sola vez al iniciar el stack (igual patrón que `init`).
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-c"]
    command: ["ollama pull qwen2.5:3b"]
    environment:
      OLLAMA_HOST: ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config.celery worker -Q celery,ia -l info
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  media_data:
  ollama_data:
