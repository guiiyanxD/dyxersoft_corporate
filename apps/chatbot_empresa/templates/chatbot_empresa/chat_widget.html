<div id="chat-widget-dyxersoft">
    <button class="btn btn-primary rounded-circle shadow" style="width:56px; height:56px;"
            type="button" data-bs-toggle="collapse" data-bs-target="#chat-widget-body"
            aria-expanded="false" aria-controls="chat-widget-body">
        <i class="bi bi-chat-dots-fill fs-5"></i>
    </button>
    <div class="collapse mt-2" id="chat-widget-body">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white d-flex align-items-center gap-2">
                <i class="bi bi-robot"></i> Asistente Dyxersoft
            </div>
            <div class="card-body" style="max-height: 50vh; overflow-y: auto;">
                {% include "chatbot_empresa/_chat_mensajes.html" %}
            </div>
            <div class="card-footer">
                <form hx-post="{% url 'chatbot_empresa:mensaje' %}"
                      hx-target="#chat-mensajes"
                      hx-swap="outerHTML"
                      hx-on:htmx:after-request="this.reset()"
                      class="d-flex gap-2">
                    {% csrf_token %}
                    <input type="text" name="contenido" class="form-control form-control-sm"
                           placeholder="Preguntame sobre Dyxersoft..." autocomplete="off" required>
                    <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-send-fill"></i></button>
                </form>
            </div>
        </div>
    </div>
</div>
